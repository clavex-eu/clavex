name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to upload release artifacts (SBOM)
  packages: write   # ghcr.io push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Detect changed paths ──────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'internal/db/migrations/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'Dockerfile.frontend'
              - '.github/workflows/ci.yml'

  # ── Test + Lint ───────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    needs: changes
    # Run on backend changes, and always on version-tag pushes so a release
    # rebuilds and re-tests before publishing images.
    if: needs.changes.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        go: ["1.26.2"]

    # Ephemeral CI-only fixtures. The Postgres/Redis service containers below
    # exist solely for the duration of this job and are never network-exposed
    # (localhost, torn down with the runner). These are test values, not secrets.
    env:
      PGUSER: clavex
      PGPASSWORD: clavex_dev
      PGDATABASE: clavex
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: clavex
          POSTGRES_PASSWORD: clavex_dev
          POSTGRES_DB: clavex
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U clavex"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Compose ephemeral CI service URLs
        run: |
          echo "CLAVEX_DATABASE_DSN=postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable" >> "$GITHUB_ENV"
          echo "TEST_DATABASE_URL=postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable" >> "$GITHUB_ENV"
          echo "CLAVEX_REDIS_ADDR=localhost:6379" >> "$GITHUB_ENV"
          echo "TEST_REDIS_URL=redis://localhost:6379" >> "$GITHUB_ENV"
      - name: go vet
        run: go vet ./...
      - name: openapi-check
        run: |
          go run ./tools/speccheck \
            -spec internal/handler/spec/openapi.json \
            -server internal/server/server.go \
            -update
          if ! git diff --quiet internal/handler/spec/openapi.json; then
            # Self-heal only makes sense on a push to a real branch: GITHUB_REF_NAME
            # is a pushable ref there. On pull_request events GITHUB_REF_NAME is the
            # synthetic "<pr>/merge" ref (detached HEAD, not a branch on origin), so
            # `git pull --rebase origin "<pr>/merge"` fails with "couldn't find
            # remote ref" — fail loudly instead and ask the author to commit the
            # stub. On tag builds, the spec was already validated on the branch
            # push that produced this commit, so just skip.
            if [ "${GITHUB_EVENT_NAME}" != "push" ]; then
              echo "::error::openapi spec drift detected. Run 'go run ./tools/speccheck -spec internal/handler/spec/openapi.json -server internal/server/server.go -update' locally and commit internal/handler/spec/openapi.json."
              exit 1
            elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "openapi spec drift on a tag build; not pushing (validated on branch)."
            else
              git config user.name  "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add internal/handler/spec/openapi.json
              git commit -m "chore: scaffold missing OpenAPI stubs [skip ci]"
              git pull --rebase origin "${GITHUB_REF_NAME}"
              git push
            fi
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1
          args: --timeout 5m
      - name: Run migrations
        run: go run ./cmd/migrate up
        env:
          # CLAVEX_DATABASE_DSN is injected via $GITHUB_ENV by the
          # "Compose ephemeral CI service URLs" step above.
          # config.LoadFrom validates the full config (admin_secret >= 32 chars
          # unless dev). The migrate CLI loads it too, so set dev + a secret here.
          CLAVEX_AUTH_ADMIN_SECRET: ci-secret-min-32-characters-long!!
          CLAVEX_DEV: "true"
      - name: go test (race detector)
        run: go test ./... -race -count=1 -timeout 180s
        env:
          # CLAVEX_DATABASE_DSN, CLAVEX_REDIS_ADDR, TEST_DATABASE_URL and
          # TEST_REDIS_URL come from $GITHUB_ENV (compose step above). They
          # activate the DB-backed suites (org-scoped smoke test, IDOR scoping).
          CLAVEX_AUTH_ADMIN_SECRET: ci-secret-min-32-characters-long!!
          CLAVEX_DEV: "true"

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: go build ./...
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod, cache: true }
      - run: go build ./...

  # ── Sync conformance badges from CONFORMANCE.md (push to main) ───────────
  sync-badges:
    name: Sync conformance badge JSON from CONFORMANCE.md
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Update badge JSON files
        run: python3 conformance/update-badges-from-md.py
      - name: Commit updated badges
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add conformance-badge.json conformance-fapi-badge.json \
                  conformance-jarm-badge.json conformance-mtls-badge.json \
                  conformance-oid4vci-badge.json conformance-oid4vp-badge.json \
                  conformance-haip-badge.json conformance-ciba-badge.json \
                  conformance-federation-badge.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync conformance badges from CONFORMANCE.md [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "Badges already up-to-date — no commit needed"
          fi

  docker:
    name: Docker → ghcr.io
    runs-on: ubuntu-latest
    needs: build
    # Publish on main pushes and on version-tag pushes (v1.2.3).
    if: needs.build.result == 'success' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest is always produced; semver tags only emit on a vX.Y.Z tag.
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker build & push — frontend ────────────────────────────────────────
  docker-frontend:
    name: Docker Frontend → ghcr.io
    runs-on: ubuntu-latest
    needs: changes
    if: (needs.changes.outputs.frontend == 'true' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SBOM (NIS2 / CRA compliance) ──────────────────────────────────────────
  sbom:
    name: SBOM → SPDX + CycloneDX
    runs-on: ubuntu-latest
    needs: docker
    if: needs.docker.result == 'success' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM (SPDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Generate SBOM (CycloneDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 90

  # ── GitHub Release (on version tags) ──────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: sbom
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so `git describe --tags` resolves the version
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod, cache: true }
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom
      - name: Build clavex binaries
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}"; GOARCH="${target#*/}"
            out="clavex-${VERSION}-${GOOS}-${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/clavex" ./cmd/server
            tar -C dist -czf "dist/${out}.tar.gz" clavex
            rm dist/clavex
          done
          ( cd dist && sha256sum *.tar.gz > checksums.txt )
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag name drives the release; auto-generate notes from merged PRs.
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            sbom/sbom.spdx.json
            sbom/sbom.cdx.json
            dist/clavex-*.tar.gz
            dist/checksums.txt
