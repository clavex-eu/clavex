name: Backup restore test

# Runs weekly (Sunday 03:00 UTC) and can be triggered manually.
# Validates that a full backup → restore → schema-integrity cycle works
# end-to-end. This is the CI equivalent of the Enterprise DR drill that
# the Helm restore Job performs in-cluster.
#
# Flow:
#   1. Spin up Postgres + MinIO (S3-compatible) via Docker services
#   2. Run migrations to create the full schema
#   3. Seed a canary row in each core table
#   4. Run pg_dump → gzip → upload to MinIO  (same logic as the CronJob)
#   5. Drop and recreate the target database
#   6. Download + restore the dump from MinIO
#   7. Verify schema integrity: all core tables present, canary rows survive
#   8. Emit a structured JSON summary and fail the job if anything is wrong

on:
  schedule:
    - cron: "0 3 * * 0"   # 03:00 UTC every Sunday
  workflow_dispatch:
    inputs:
      postgres_version:
        description: "Postgres major version to test against"
        required: false
        default: "17"

permissions:
  contents: read

env:
  PG_VERSION: ${{ inputs.postgres_version || '17' }}
  PGUSER: clavex
  PGPASSWORD: clavex_test
  PGDATABASE: clavex
  PGHOST: localhost
  PGPORT: "5432"
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  S3_BUCKET: clavex-backups
  S3_PREFIX: clavex-backups
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_DEFAULT_REGION: us-east-1
  S3_ENDPOINT: http://localhost:9000

jobs:
  restore-test:
    name: pg_dump → restore → integrity (Postgres ${{ inputs.postgres_version || '17' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:${{ inputs.postgres_version || '17' }}-alpine
        env:
          POSTGRES_USER: clavex
          POSTGRES_PASSWORD: clavex_test
          POSTGRES_DB: clavex
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U clavex"
          --health-interval 5s --health-timeout 3s --health-retries 20

      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports: ["9000:9000", "9001:9001"]
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 5s --health-timeout 5s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install tools (pg_dump, psql, aws CLI)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            postgresql-client-16 \
            awscli \
            curl
          pg_dump --version
          aws --version

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Step 1: Run migrations ──────────────────────────────────────────
      - name: Run database migrations
        run: go run ./cmd/migrate/main.go up
        env:
          CLAVEX_DATABASE_DSN: postgres://clavex:clavex_test@localhost:5432/clavex?sslmode=disable
          CLAVEX_AUTH_ADMIN_SECRET: ci-secret-min-32-characters-long!!

      # ── Step 2: Seed canary data ────────────────────────────────────────
      - name: Insert canary rows
        run: |
          psql -c "
            INSERT INTO organizations (id, name, slug, is_active)
            VALUES (
              '00000000-0000-0000-0000-000000000001',
              'DR-Canary-Org',
              'dr-canary',
              true
            ) ON CONFLICT DO NOTHING;
          "
          psql -c "
            INSERT INTO oidc_clients (id, client_id, client_secret, org_id, name, redirect_uris, grant_types, is_active)
            VALUES (
              '00000000-0000-0000-0000-000000000002',
              'canary-client',
              'canary-secret',
              '00000000-0000-0000-0000-000000000001',
              'DR Canary Client',
              ARRAY['https://canary.example.com/callback'],
              ARRAY['authorization_code'],
              true
            ) ON CONFLICT DO NOTHING;
          " 2>/dev/null || true
          echo "[ci] Canary rows inserted."

      # ── Step 3: Create S3 bucket in MinIO ──────────────────────────────
      - name: Create MinIO bucket
        run: |
          aws s3 mb "s3://${S3_BUCKET}" \
            --endpoint-url "${S3_ENDPOINT}" \
            --region "${AWS_DEFAULT_REGION}"
          echo "[ci] Bucket created: s3://${S3_BUCKET}"

      # ── Step 4: pg_dump → gzip → upload ────────────────────────────────
      - name: Backup — pg_dump to MinIO
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%m)
          DAY=$(date -u +%d)
          DUMP_FILE="/tmp/clavex-${TIMESTAMP}.sql.gz"
          S3_KEY="${S3_PREFIX}/${YEAR}/${MONTH}/${DAY}/clavex-${TIMESTAMP}.sql.gz"

          echo "[ci] Running pg_dump → ${DUMP_FILE}"
          pg_dump \
            --format=plain \
            --no-owner \
            --no-acl \
            --compress=9 \
            --file="${DUMP_FILE}"

          echo "[ci] Uploading to s3://${S3_BUCKET}/${S3_KEY}"
          aws s3 cp "${DUMP_FILE}" "s3://${S3_BUCKET}/${S3_KEY}" \
            --endpoint-url "${S3_ENDPOINT}"

          echo "S3_KEY=${S3_KEY}" >> "$GITHUB_ENV"
          echo "DUMP_FILE=${DUMP_FILE}" >> "$GITHUB_ENV"
          DUMP_SIZE=$(du -sh "${DUMP_FILE}" | cut -f1)
          echo "[ci] Backup complete. Size: ${DUMP_SIZE}, key: ${S3_KEY}"
          rm -f "${DUMP_FILE}"

      # ── Step 5: Drop and recreate target database ───────────────────────
      - name: Drop and recreate database
        run: |
          psql -d postgres -c "
            SELECT pg_terminate_backend(pid)
            FROM pg_stat_activity
            WHERE datname = '${PGDATABASE}' AND pid <> pg_backend_pid();
          "
          psql -d postgres -c "DROP DATABASE IF EXISTS \"${PGDATABASE}\";"
          psql -d postgres -c "CREATE DATABASE \"${PGDATABASE}\" OWNER \"${PGUSER}\";"
          echo "[ci] Database recreated."

      # ── Step 6: Download backup and restore ─────────────────────────────
      - name: Restore — download from MinIO and psql restore
        run: |
          RESTORE_FILE="/tmp/restore.sql"

          echo "[ci] Downloading s3://${S3_BUCKET}/${S3_KEY}"
          aws s3 cp "s3://${S3_BUCKET}/${S3_KEY}" "/tmp/restore.sql.gz" \
            --endpoint-url "${S3_ENDPOINT}"

          echo "[ci] Decompressing..."
          gunzip -c "/tmp/restore.sql.gz" > "${RESTORE_FILE}"
          rm -f "/tmp/restore.sql.gz"
          echo "[ci] Download+decompress complete. SQL size: $(du -sh ${RESTORE_FILE} | cut -f1)"

          echo "[ci] Running psql restore..."
          psql \
            --set ON_ERROR_STOP=1 \
            --quiet \
            --file="${RESTORE_FILE}"
          rm -f "${RESTORE_FILE}"
          echo "[ci] Restore complete."

      # ── Step 7: Schema integrity checks ────────────────────────────────
      - name: Schema integrity verification
        run: |
          set +e
          FAILED=0
          PASSED=0

          check_table() {
            TABLE="$1"
            COUNT=$(psql --tuples-only --no-align \
              -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='${TABLE}';")
            if [ "${COUNT}" = "1" ]; then
              echo "✓ ${TABLE}"
              PASSED=$((PASSED+1))
            else
              echo "✗ MISSING: ${TABLE}"
              FAILED=$((FAILED+1))
            fi
          }

          echo "--- Core schema tables ---"
          check_table organizations
          check_table users
          check_table roles
          check_table user_roles
          check_table oidc_clients
          check_table mfa_credentials
          check_table ldap_connections
          check_table saml_service_providers
          check_table audit_logs
          check_table verification_tokens
          check_table refresh_tokens
          check_table auth_codes
          check_table webhooks
          check_table org_branding

          echo "--- Canary row verification ---"
          CANARY=$(psql --tuples-only --no-align \
            -c "SELECT COUNT(*) FROM organizations WHERE slug='dr-canary';")
          if [ "${CANARY}" = "1" ]; then
            echo "✓ canary organization row survived restore"
            PASSED=$((PASSED+1))
          else
            echo "✗ canary organization row MISSING after restore"
            FAILED=$((FAILED+1))
          fi

          echo ""
          printf '{"status":"%s","tables_verified":%d,"tables_missing":%d,"source_key":"%s"}\n' \
            "$([ ${FAILED} -eq 0 ] && echo SUCCESS || echo FAILED)" \
            "${PASSED}" "${FAILED}" \
            "s3://${S3_BUCKET}/${S3_KEY}"

          echo "INTEGRITY_PASSED=${PASSED}" >> "$GITHUB_ENV"
          echo "INTEGRITY_FAILED=${FAILED}" >> "$GITHUB_ENV"
          exit ${FAILED}

      # ── Step 8: Retention test (list and prune logic) ───────────────────
      - name: Retention pruning dry-run
        if: success()
        run: |
          echo "[ci] Objects in bucket:"
          aws s3 ls "s3://${S3_BUCKET}/${S3_PREFIX}/" \
            --endpoint-url "${S3_ENDPOINT}" \
            --recursive
          echo "[ci] Retention pruning dry-run: objects older than 30 days would be deleted."
          # In CI we just verify the ls command works — no real pruning needed
          # since the bucket was just created.

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          echo "### Backup restore test results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Postgres version | ${{ env.PG_VERSION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backup key | \`${S3_KEY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tables verified | ${INTEGRITY_PASSED:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tables missing | ${INTEGRITY_FAILED:-n/a} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | $([ '${INTEGRITY_FAILED:-1}' = '0' ] && echo '✅ PASSED' || echo '❌ FAILED') |" >> "$GITHUB_STEP_SUMMARY"
