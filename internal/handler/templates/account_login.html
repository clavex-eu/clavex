{{define "account_login"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in{{if .OrgName}} — {{.OrgName}}{{end}}</title>
  <script nonce="{{.Nonce}}" src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Brand / logo -->
    <div class="text-center mb-8">
      {{if .LogoURL}}
        <img src="{{.LogoURL}}" alt="{{.OrgName}}" class="h-10 w-auto mx-auto mb-4 object-contain" />
      {{else}}
        <div class="h-10 w-10 rounded-xl bg-emerald-600 flex items-center justify-center text-white text-lg font-bold mx-auto mb-4 select-none">
          {{if .OrgName}}{{slice .OrgName 0 1}}{{else}}C{{end}}
        </div>
      {{end}}
      <h1 class="text-xl font-semibold text-gray-900">My Account</h1>
      {{if .OrgName}}
      <p class="text-sm text-gray-500 mt-1">{{.OrgName}}</p>
      {{end}}
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 px-6 py-7">

      {{if .Error}}
      <div class="mb-5 flex items-start gap-2 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-800">
        <svg class="w-4 h-4 mt-0.5 shrink-0 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
        </svg>
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="" novalidate>
        <div class="space-y-4">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email"
                   class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder-gray-400
                          focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                   placeholder="you@company.com" />
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password"
                   class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder-gray-400
                          focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                   placeholder="••••••••" />
          </div>
        </div>

        <button type="submit"
                class="mt-6 w-full flex justify-center rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white
                       hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition-colors">
          Sign in
        </button>
      </form>

    </div>

  </div>

</body>
</html>
{{end}}
