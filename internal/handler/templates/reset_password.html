<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Your Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #F0F4F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 16px; padding: 48px; max-width: 440px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    h1 { font-size: 22px; font-weight: 700; color: #0D1F2D; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #6B7A8D; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type=password] { width: 100%; padding: 10px 14px; border: 1.5px solid #E5E7EB; border-radius: 10px; font-size: 14px; outline: none; transition: border .15s; }
    input[type=password]:focus { border-color: #1D9E75; }
    .field { margin-bottom: 20px; }
    .btn { width: 100%; padding: 12px; background: #1D9E75; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #178A65; }
    .error { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set new password</h1>
    <p class="subtitle">Enter a new password for your account.</p>

    {{if .Error}}
    <div class="error">{{.Error}}</div>
    {{end}}

    <form method="POST">
      <input type="hidden" name="token" value="{{.Token}}" />
      <input type="hidden" name="org_slug" value="{{.OrgSlug}}" />
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="confirm">Confirm new password</label>
        <input type="password" id="confirm" name="confirm" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn">Set new password</button>
    </form>
  </div>
</body>
</html>
