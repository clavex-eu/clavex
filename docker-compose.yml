services:

  # ── PostgreSQL (usato solo in modalità "external" o per sviluppo) ───────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clavex
      POSTGRES_PASSWORD: clavex_dev
      POSTGRES_DB: clavex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clavex"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis (sessioni, rate-limit, token revocation list) ────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── clavex server ──────────────────────────────────────────────────────────
  clavex:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      CLAVEX_DEV: "true"
      CLAVEX_HTTP_ADDR: ":8080"
      CLAVEX_HTTP_BASE_DOMAIN: "localhost:8080"
      CLAVEX_DATABASE_MODE: "external"
      CLAVEX_DATABASE_DSN: "postgres://clavex:clavex_dev@postgres:5432/clavex?sslmode=disable"
      CLAVEX_REDIS_ADDR: "redis:6379"
      CLAVEX_AUTH_ISSUER_BASE: "http://localhost:8080"
      CLAVEX_AUTH_SIGNING_KEY_FILE: "/keys/signing.pem"
      CLAVEX_AUTH_ADMIN_SECRET: "dev-secret-change-in-prod-use-openssl-rand-hex-32"
    volumes:
      - ./keys:/keys:ro   # mount as read-only; generate with: make generate-keys

volumes:
  postgres_data:
