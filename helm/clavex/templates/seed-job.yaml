{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "clavex.fullname" . }}-seed
  labels:
    {{- include "clavex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: seed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /seed
            - -org={{ .Values.seed.orgSlug }}
            - -org-name={{ .Values.seed.orgName | default .Values.seed.orgSlug }}
            - -email={{ .Values.seed.adminEmail }}
            - -superadmin
          env:
            - name: CLAVEX_SEED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seed.adminPasswordSecret.name }}
                  key: {{ .Values.seed.adminPasswordSecret.key }}
          envFrom:
            - configMapRef:
                name: {{ include "clavex.fullname" . }}
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
{{- end }}
