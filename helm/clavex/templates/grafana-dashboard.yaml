{{- if .Values.grafana.dashboards.enabled }}
{{- /*
  Grafana dashboard-as-code, distributed as a ConfigMap.

  When Grafana is deployed with the sidecar enabled:
    grafana.sidecar.dashboards.enabled=true
    grafana.sidecar.dashboards.label=grafana_dashboard

  the sidecar (grafana/grafana-sc-dashboard) watches for ConfigMaps carrying
  that label and hot-loads them into Grafana automatically — no manual import.

  All panels are built on the five clavex_ Prometheus metrics:
    clavex_logins_total{org, status, method}
    clavex_tokens_issued_total{org, grant_type}
    clavex_risk_score_bucket{org}
    clavex_elevate_challenges_total{status}
    clavex_http_request_duration_seconds_bucket{method, route, code}
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clavex.fullname" . }}-grafana-dashboard
  namespace: {{ .Values.grafana.dashboards.namespace | default .Release.Namespace }}
  labels:
    {{- include "clavex.labels" . | nindent 4 }}
    {{ .Values.grafana.dashboards.label }}: "1"
    {{- with .Values.grafana.dashboards.labelValue }}
    grafana_dashboard_folder: {{ . | quote }}
    {{- end }}
data:
  clavex-overview.json: |-
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "annotations": { "list": [] },
      "description": "Clavex IAM — login rate, token throughput, risk scores, step-up MFA funnel, HTTP latency",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "🔑  Authentication",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "reqps"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "failure" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#F2495C", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "success" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#73BF69", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (status) (rate(clavex_logins_total{org=~\"$org\"}[$__rate_interval]))",
              "legendFormat": "{{ "{{status}}" }}"
            }
          ],
          "title": "Login rate (req/s) by status",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (org) (rate(clavex_logins_total{org=~\"$org\",status=\"success\"}[$__rate_interval]))",
              "legendFormat": "{{ "{{org}}" }}"
            }
          ],
          "title": "Successful login rate per org",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "#EAB839", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              },
              "mappings": []
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 9 },
          "id": 3,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(increase(clavex_logins_total{org=~\"$org\",status=\"failure\"}[5m]))",
              "legendFormat": "failures / 5m"
            }
          ],
          "title": "Login failures (5m window)",
          "type": "stat"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "percentunit" } },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 9 },
          "id": 4,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background",
            "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.1 }] }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(clavex_logins_total{org=~\"$org\",status=\"failure\"}[$__rate_interval])) / clamp_min(sum(rate(clavex_logins_total{org=~\"$org\"}[$__rate_interval])),1)",
              "legendFormat": "error rate"
            }
          ],
          "title": "Login error rate",
          "type": "stat"
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "id": 101,
          "title": "🪙  Token throughput",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "id": 5,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (grant_type) (rate(clavex_tokens_issued_total{org=~\"$org\"}[$__rate_interval]))",
              "legendFormat": "{{ "{{grant_type}}" }}"
            }
          ],
          "title": "Token issuance rate by grant type",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (org) (rate(clavex_tokens_issued_total{org=~\"$org\"}[$__rate_interval]))",
              "legendFormat": "{{ "{{org}}" }}"
            }
          ],
          "title": "Token issuance rate per org",
          "type": "timeseries"
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 },
          "id": 102,
          "title": "⚠️  Risk score distribution",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 80, "lineWidth": 0 },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 23 },
          "id": 7,
          "options": {
            "bucketSize": "auto",
            "combine": false,
            "fillOpacity": 80,
            "gradientMode": "none",
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (le) (increase(clavex_risk_score_bucket{org=~\"$org\"}[$__rate_interval]))",
              "legendFormat": "≤ {{ "{{le}}" }}",
              "format": "heatmap"
            }
          ],
          "title": "Risk score distribution (heatmap buckets)",
          "type": "histogram"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "#EAB839", "value": 0.3 },
                { "color": "red", "value": 0.6 }
              ]}
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 23 },
          "id": 8,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(clavex_risk_score_bucket{org=~\"$org\"}[$__rate_interval])))",
              "legendFormat": "p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.90, sum by (le) (rate(clavex_risk_score_bucket{org=~\"$org\"}[$__rate_interval])))",
              "legendFormat": "p90"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(clavex_risk_score_bucket{org=~\"$org\"}[$__rate_interval])))",
              "legendFormat": "p99"
            }
          ],
          "title": "Risk score percentiles",
          "type": "stat"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "high-risk (>75)" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#F2495C", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 23 },
          "id": 9,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(clavex_risk_score_bucket{org=~\"$org\",le=\"50\"}[$__rate_interval]))",
              "legendFormat": "low-risk (≤50)"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(clavex_risk_score_bucket{org=~\"$org\",le=\"75\"}[$__rate_interval])) - sum(rate(clavex_risk_score_bucket{org=~\"$org\",le=\"50\"}[$__rate_interval]))",
              "legendFormat": "elevated (51-75)"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(clavex_risk_score_bucket{org=~\"$org\",le=\"+Inf\"}[$__rate_interval])) - sum(rate(clavex_risk_score_bucket{org=~\"$org\",le=\"75\"}[$__rate_interval]))",
              "legendFormat": "high-risk (>75)"
            }
          ],
          "title": "Risk band split (rate)",
          "type": "timeseries"
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 },
          "id": 103,
          "title": "🛡️  Elevate (step-up MFA) funnel",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "reqps"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "completed" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#73BF69", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "failed" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#F2495C", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "expired" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#FF780A", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "id": 10,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (status) (rate(clavex_elevate_challenges_total[$__rate_interval]))",
              "legendFormat": "{{ "{{status}}" }}"
            }
          ],
          "title": "Elevate challenge rate by status",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1,
            "thresholds": { "mode": "absolute", "steps": [
              { "color": "red", "value": null },
              { "color": "#EAB839", "value": 0.7 },
              { "color": "green", "value": 0.9 }
            ]}
          }},
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 32 },
          "id": 11,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(clavex_elevate_challenges_total{status=\"completed\"}[$__rate_interval])) / clamp_min(sum(rate(clavex_elevate_challenges_total{status=\"created\"}[$__rate_interval])),1)",
              "legendFormat": "completion rate"
            }
          ],
          "title": "Elevate completion rate",
          "type": "gauge"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" },
            "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 5 }] }
          }},
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 32 },
          "id": 12,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(increase(clavex_elevate_challenges_total{status=\"created\"}[$__rate_interval]))",
              "legendFormat": "created"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(increase(clavex_elevate_challenges_total{status=\"completed\"}[$__rate_interval]))",
              "legendFormat": "completed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(increase(clavex_elevate_challenges_total{status=\"failed\"}[$__rate_interval]))",
              "legendFormat": "failed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(increase(clavex_elevate_challenges_total{status=\"expired\"}[$__rate_interval]))",
              "legendFormat": "expired"
            }
          ],
          "title": "Elevate funnel (window totals)",
          "type": "stat"
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 40 },
          "id": 104,
          "title": "📡  HTTP latency",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "s"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "p99" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#F2495C", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "p95" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#FF780A", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "p50" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#73BF69", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 41 },
          "id": 13,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(clavex_http_request_duration_seconds_bucket{route=~\"$route\"}[$__rate_interval])))",
              "legendFormat": "p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(clavex_http_request_duration_seconds_bucket{route=~\"$route\"}[$__rate_interval])))",
              "legendFormat": "p95"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(clavex_http_request_duration_seconds_bucket{route=~\"$route\"}[$__rate_interval])))",
              "legendFormat": "p99"
            }
          ],
          "title": "HTTP latency p50/p95/p99",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "thresholds" },
            "thresholds": { "mode": "absolute", "steps": [
              { "color": "green", "value": null },
              { "color": "#EAB839", "value": 0.5 },
              { "color": "red", "value": 1.0 }
            ]}
          }},
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 41 },
          "id": 14,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "textMode": "value_and_name" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(clavex_http_request_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "p50 (all)"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(clavex_http_request_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "p95 (all)"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(clavex_http_request_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "p99 (all)"
            }
          ],
          "title": "Current latency percentiles",
          "type": "stat"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 49 },
          "id": 15,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (route) (rate(clavex_http_request_duration_seconds_count{route=~\"$route\"}[$__rate_interval]))",
              "legendFormat": "{{ "{{route}}" }}"
            }
          ],
          "title": "Request throughput by route",
          "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 5 },
              "unit": "reqps"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "^5.*" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#F2495C", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byRegexp", "options": "^4.*" },
                "properties": [{ "id": "color", "value": { "fixedColor": "#FF780A", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 49 },
          "id": 16,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (code) (rate(clavex_http_request_duration_seconds_count{route=~\"$route\"}[$__rate_interval]))",
              "legendFormat": "HTTP {{ "{{code}}" }}"
            }
          ],
          "title": "Request rate by HTTP status code",
          "type": "timeseries"
        }

      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["clavex", "iam", "identity"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(clavex_logins_total, org)",
            "hide": 0,
            "includeAll": true,
            "allValue": ".*",
            "label": "Org",
            "multi": true,
            "name": "org",
            "options": [],
