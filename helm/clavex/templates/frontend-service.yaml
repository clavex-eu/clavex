{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clavex.fullname" . }}-frontend
  labels:
    {{- include "clavex.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "clavex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
